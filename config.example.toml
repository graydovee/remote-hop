# rhop example config
#
# The program can run without any config file.
# Default behavior with no config:
# - local daemon socket enabled: ~/.rhop/rhopd.sock
# - remote daemon listener disabled
# - target resolution: derive IP from the first CLI argument
# - direct SSH only: the derived IP must match a Host entry in ~/.ssh/config
# - jumpserver: disabled by default
# - command review: disabled by default
#
# Copy only the sections you need into ~/.rhop/config.toml.
# Every setting below is commented out on purpose.

# [server]
# log_path = "/var/log/rhopd.log"
# log_level = "info"
# reaper_interval = "30s"

# [server.local]
# enable = true
# socket_path = "~/.rhop/rhopd.sock"

# [server.remote]
# enable = true
# listen_addr = "0.0.0.0:2222"
# user = "rhop"
# host_key_path = "~/.rhop/host_key"
# authorized_keys_path = "~/.rhop/authorized_keys"

# [ssh]
# ssh_config_path = "~/.ssh/config"
# server_config_path = "~/.rhop/server.toml"
# fallback = ["ssh_config", "jumpserver"]
# pty = true
# connect_timeout = "10s"
# keepalive_interval = "30s"
# max_idle_time = "10m"
# max_connections_per_ip = 10

# Enable this only when a target is not reachable through ~/.ssh/config direct SSH.
# [jumpserver]
# enabled = true
# host = "braum-ssh.agoralab.co"
# port = 20221
# user = "user@example.com"
# identity_file = "~/.ssh/id_rsa"
# menu_prompt_contains = "Opt"
# mfa_prompt_contains = "MFA"
# shell_prompt_suffixes = ["$ ", "# "]

# [jumpserver.mfa]
# totp_secret_base32 = "REPLACE_ME"
# digits = 6
# period = 30
# digest = "sha1"

# Enable this only when you want LLM command review before execution.
# If api_key is omitted, rhop will try RHOP_REVIEW_API_KEY first, then OPENAI_API_KEY.
# endpoint, model, prompts, policy, and semantic_whitelist all have code defaults.
# [review]
# enable = true
# endpoint = "https://api.openai.com/v1/chat/completions"
# model = "gpt-4.1-mini"
# api_key = "REPLACE_ME"
# timeout = "10s"
# failure_action = "deny"

# [review.fast_allowlist]
# enable = true
# commands = ["ls", "ls *", "cat *", "grep *", "kubectl get *"]

# [review.headers]
# Authorization = "Bearer REPLACE_ME"

# [review.prompts]
# system = "You are a command safety reviewer. Return JSON only."
# template = """
# Classify the command into exactly one risk level: safe, risky, or dangerous.
# Return compact JSON with keys: risk_level, reason, matched_whitelist_reason.
# """

