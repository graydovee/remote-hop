name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-release-binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin rhop --bin rhopd
          else
            cargo build --release --target ${{ matrix.target }} --bin rhop --bin rhopd
          fi

      - name: Package release archive
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="remote-hop-${TAG}-${{ matrix.target }}"
          mkdir -p "${PKG}"
          cp "target/${{ matrix.target }}/release/rhop" "${PKG}/"
          cp "target/${{ matrix.target }}/release/rhopd" "${PKG}/"
          cp config.example.toml "${PKG}/"
          cp packaging/systemd/rhopd.service "${PKG}/"
          tar -czf "${PKG}.tar.gz" "${PKG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: remote-hop-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  docker-ghcr:
    name: docker ghcr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/remote-hop
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: github release
    runs-on: ubuntu-latest
    needs:
      - build-release-binaries
      - docker-ghcr
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
