syntax = "proto3";

package rhop.rpc;

service RhopRpc {
  rpc Execute(stream ExecuteRequest) returns (stream ExecuteResponse);
  rpc Copy(stream CopyRequest) returns (stream CopyResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc ListConfig(ConfigListRequest) returns (ConfigListResponse);
  rpc ListServers(ServerListRequest) returns (ServerListResponse);
  rpc Shutdown(ShutdownRequest) returns (InfoResponse);
}

message ExecuteRequest {
  oneof request {
    StartRequest start = 1;
    ConfirmRequest confirm = 2;
    AuthInputRequest auth_input = 3;
  }
}

message StartRequest {
  string target = 1;
  repeated string argv = 2;
}

message ConfirmRequest {
  string execution_id = 1;
  bool allow = 2;
}

message AuthInputRequest {
  string prompt_id = 1;
  string value = 2;
}

enum CopyDirection {
  COPY_DIRECTION_UNSPECIFIED = 0;
  COPY_DIRECTION_UPLOAD = 1;
  COPY_DIRECTION_DOWNLOAD = 2;
}

message CopyRequest {
  oneof request {
    CopyStartRequest start = 1;
    AuthInputRequest auth_input = 2;
  }
}

message CopyStartRequest {
  string target = 1;
  string local_path = 2;
  string remote_path = 3;
  bool recursive = 4;
  CopyDirection direction = 5;
}

message ExecuteResponse {
  oneof event {
    ReviewResult review_result = 1;
    ConfirmRequired confirm_required = 2;
    OutputChunk stdout = 3;
    OutputChunk stderr = 4;
    ExitStatus exit_status = 5;
    InfoResponse info = 6;
    ErrorResponse error = 7;
    AuthPrompt auth_prompt = 8;
  }
}

message CopyResponse {
  oneof event {
    InfoResponse info = 1;
    ErrorResponse error = 2;
    AuthPrompt auth_prompt = 3;
    CopyComplete complete = 4;
  }
}

message ReviewResult {
  string execution_id = 1;
  string risk_level = 2;
  string action = 3;
  string reason = 4;
  string matched_whitelist_reason = 5;
}

message ConfirmRequired {
  string execution_id = 1;
  string reason = 2;
}

message AuthPrompt {
  string prompt_id = 1;
  string target_label = 2;
  string kind = 3;
  bool secret = 4;
  string message = 5;
}

message OutputChunk {
  bytes data = 1;
}

message ExitStatus {
  int32 code = 1;
}

message CopyComplete {
  string message = 1;
}

message ErrorResponse {
  string message = 1;
}

message InfoResponse {
  string message = 1;
}

message StatusRequest {}

message ConfigListRequest {}

message ServerListRequest {}

message ShutdownRequest {}

message StatusResponse {
  bool daemon_running = 1;
  string local_socket_path = 2;
  uint64 active_executions = 3;
  repeated PoolStatus pools = 4;
  string daemon_origin = 5;
  bool cli_controllable = 6;
  string cli_start_config_path = 7;
  string cli_start_log_level = 8;
  bool local_enabled = 9;
  bool remote_enabled = 10;
  string remote_listen_addr = 11;
  string remote_user = 12;
}

message ConfigListResponse {
  string config_path = 1;
  string server_config_path = 2;
  string ssh_config_path = 3;
  string local_socket_path = 4;
  repeated string fallback = 5;
  bool jumpserver_enabled = 6;
  string jumpserver_host = 7;
  bool local_enabled = 8;
  bool remote_enabled = 9;
  string remote_listen_addr = 10;
  string remote_user = 11;
  string authorized_keys_path = 12;
  string host_key_path = 13;
}

message ServerListResponse {
  string server_config_path = 1;
  repeated ServerEntry servers = 2;
}

message ServerEntry {
  string alias = 1;
  string host = 2;
  uint32 port = 3;
  string user = 4;
  string auth_kind = 5;
}

message PoolStatus {
  string key = 1;
  uint64 total = 2;
  uint64 busy = 3;
  uint64 idle = 4;
  uint64 queued = 5;
}
